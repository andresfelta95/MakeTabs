server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # All backend traffic lives under /api — the trailing slash on proxy_pass
    # strips the prefix, so /api/tabs/history hits the backend as /tabs/history.
    # This keeps SPA page routes (/tabs, /16bit, /chiptune/:id) from colliding
    # with API paths.
    location /api/ {
        proxy_pass http://maketabs-backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Kept at the root for uptime monitors
    location = /health {
        proxy_pass http://maketabs-backend:8000/health;
    }

    # React SPA — serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
